function decodeB64Utf8(b64){
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

function showTab(name){
  document.getElementById('btn-live').classList.toggle('active', name === 'live');
  document.getElementById('btn-nse').classList.toggle('active', name === 'nse');
  document.getElementById('frame-live').classList.toggle('active', name === 'live');
  document.getElementById('frame-nse').classList.toggle('active', name === 'nse');
}

    document.getElementById('loadingMsg').style.display = 'none';
  } catch(err){
    document.getElementById('loadingMsg').innerText = 'ஏற்றுவதில் பிழை: ' + err.message;
  }
});
</script>

</body>
